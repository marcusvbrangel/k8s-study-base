apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: wolfshop-promotion
  name: wolfshop-promotion
  namespace: wolfshop
#--------------- deploy -------------------------------------------  
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wolfshop-promotion
#---------------- pod ---------------------------------------------      
  template:
    metadata:
      labels:
        app: wolfshop-promotion
    spec:


      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 3000

      containers:
      - image: marcusvbrangel/wolfshop-promotion:1.3.0
        name: wolfshop-promotion-container        
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "384Mi"
            cpu: "500m"
        envFrom:
        - configMapRef:
            name: wolfshop-promotion-configmap
        - secretRef:
            name: wolfshop-promotion-secret

        env:
          - name: JAVA_TOOL_OPTIONS
            value: "-XX:MaxRAMPercentage=75 -Djava.security.egd=file:/dev/./urandom"

        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          periodSeconds: 5
          failureThreshold: 15
          timeoutSeconds: 2

        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          periodSeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 3

        volumeMounts:
        - name: promotion-volume
          mountPath: /data
        ports:
        - containerPort: 8080
      volumes:
      - name: promotion-volume
        persistentVolumeClaim:
          claimName: wolfshop-nfs-pvc
